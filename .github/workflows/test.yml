name: Run JS Tests

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Run all test files
      run: |
        node FinalReportTestcases.js
        node HistoryLogsTestcases.js
        node AccountRemovalTests.js
